[www]
user = nobody
group = nobody
listen = 127.0.0.1:9000

pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4
pm.max_requests = 500

clear_env = no

catch_workers_output = yes
decorate_workers_output = no

php_admin_value[error_log] = /dev/stderr
php_admin_flag[log_errors] = on
