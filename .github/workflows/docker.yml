name: Build and push Docker image to GHCR

# Triggers:
#   - Pushing a version tag (v0.1.0, v0.2.0, etc.) -> tagged image
#   - Pushing to main -> :latest (smoke test; consumers should pin to a version)
#   - Manual dispatch -> ad-hoc build
on:
  push:
    tags: ['v*']
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/agila-suites

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=Agila Suites
            org.opencontainers.image.description=Self-hosted multi-marketplace ERP - Cloud image
            org.opencontainers.image.licenses=AGPL-3.0-or-later
            org.opencontainers.image.source=https://github.com/reboot-interactive/agila-suites
            org.opencontainers.image.vendor=Reboot Interactive

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
